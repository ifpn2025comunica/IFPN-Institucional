<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - IFPN</title>
    <link rel="icon" type="image/png" href="/assets/images/imgPLF.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .sidebar {
            transition: all 0.3s;
        }
        .sidebar-link {
            transition: all 0.2s;
        }
        .sidebar-link:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .sidebar-link.active {
            background-color: rgba(255,255,255,0.2);
            border-left: 4px solid white;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar w-64 bg-indigo-800 text-white flex flex-col">
            <div class="p-6">
                <h1 class="text-2xl font-bold">IFPN Admin</h1>
                <p class="text-indigo-200 text-sm mt-1">Painel de Controlo</p>
            </div>
            
            <nav class="flex-1 px-4 space-y-2">
                <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg active" data-section="dashboard">
                    <i class="fas fa-home w-6"></i>
                    <span>Dashboard</span>
                </a>
                
                <div class="pt-4">
                    <p class="text-indigo-200 text-xs uppercase tracking-wider px-4 mb-2">Gestão</p>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="associados">
                        <i class="fas fa-users w-6"></i>
                        <span>Associados</span>
                    </a>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="quotas">
                        <i class="fas fa-euro-sign w-6"></i>
                        <span>Quotas</span>
                    </a>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="noticias">
                        <i class="fas fa-newspaper w-6"></i>
                        <span>Notícias</span>
                    </a>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="eventos">
                        <i class="fas fa-calendar-alt w-6"></i>
                        <span>Eventos</span>
                    </a>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="projetos">
                        <i class="fas fa-project-diagram w-6"></i>
                        <span>Projetos</span>
                    </a>
                </div>
                
                <div class="pt-4">
                    <p class="text-indigo-200 text-xs uppercase tracking-wider px-4 mb-2">Comunicações</p>
                    
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="newsletter">
                        <i class="fas fa-envelope w-6"></i>
                        <span>Newsletter</span>
                    </a>

                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="contacto">
                        <i class="fas fa-ticket-alt w-6"></i>
                        <span>Mensagens</span>
                        <span id="badgeMensagens" class="ml-auto bg-red-500 text-white text-xs px-2 py-1 rounded-full hidden">0</span>
                    </a>
                </div>
                
                <div class="pt-4">
                    <a href="#" class="sidebar-link flex items-center px-4 py-3 rounded-lg" data-section="configuracoes">
                        <i class="fas fa-cog w-6"></i>
                        <span>Configurações</span>
                    </a>
                </div>
            </nav>
            
            <div class="p-4 border-t border-indigo-700">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center">
                        <i class="fas fa-user-circle text-2xl"></i>
                    </div>
                    <div class="ml-3 flex-1">
                        <p class="text-sm font-medium" id="adminNome">Admin</p>
                        <p class="text-xs text-indigo-200">Administrador</p>
                    </div>
                    <button onclick="logout()" class="text-indigo-200 hover:text-white">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Header -->
            <header class="bg-white shadow-sm">
                <div class="px-6 py-4 flex justify-between items-center">
                    <h2 class="text-xl font-semibold text-gray-800" id="pageTitle">Dashboard</h2>

                    <div class="flex items-center space-x-4">
                        <button onclick="window.location.href='../index.html'" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm" title="Voltar para a página inicial">
                            <i class="fas fa-home mr-2"></i>Página Inicial
                        </button>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="flex-1 overflow-y-auto bg-gray-100 p-6" id="contentArea">
                <!-- Dynamic content will be loaded here -->
                <div class="text-center text-gray-500">
                    Carregando...
                </div>
            </main>
        </div>
    </div>

    <script>
        // ===== CONFIG & AUTH =====
        const token = localStorage.getItem('token');
        const associado = JSON.parse(localStorage.getItem('associado') || '{}');
        const API_BASE = 'https://ifpn-institucional-backend.onrender.com/api';

        // Verificar se é admin
        if (!token || associado.role !== 'admin') {
            window.location.href = '/';
        }

        document.getElementById('adminNome').textContent = associado.nome || 'Admin';

        // ===== UTILITY FUNCTIONS =====
        /**
         * Faz fetch seguro com tratamento de erro
         */
        async function apiFetch(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status} ${response.statusText}`);
                }

                return await response.json();
            } catch (error) {
                console.error(`Fetch error for ${endpoint}:`, error);
                throw error;
            }
        }

        /**
         * Renderiza um stat card reutilizável
         */
        function createStatCard(icon, bgColor, iconColor, label, value) {
            return `
                <div class="bg-white rounded-lg shadow p-6">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-${bgColor}-100 rounded-full flex items-center justify-center">
                            <i class="fas fa-${icon} text-${iconColor}-600 text-xl"></i>
                        </div>
                        <div class="ml-4">
                            <p class="text-gray-500 text-sm">${label}</p>
                            <p class="text-2xl font-bold">${value}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        /**
         * Mostra mensagem de erro ao utilizador
         */
        function showError(content, message = 'Erro ao carregar dados') {
            content.innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                    <i class="fas fa-exclamation-circle text-red-500 text-3xl mb-2"></i>
                    <p class="text-red-700 font-medium">${message}</p>
                    <button onclick="location.reload()" class="mt-4 px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">
                        Recarregar Página
                    </button>
                </div>
            `;
        }

        /**
         * Mostra loading spinner
         */
        function showLoading(content) {
            content.innerHTML = `
                <div class="flex justify-center items-center h-64">
                    <div class="animate-spin">
                        <i class="fas fa-spinner text-indigo-600 text-4xl"></i>
                    </div>
                </div>
            `;
        }

        /**
         * Valida dados antes de enviar ao servidor
         */
        function validateFormData(data, required = []) {
            for (let field of required) {
                if (!data[field] || (typeof data[field] === 'string' && data[field].trim() === '')) {
                    return { valid: false, error: `Campo ${field} é obrigatório` };
                }
            }
            return { valid: true };
        }

        /**
         * Renderiza um card de tabela reutilizável
         */
        function createTableCard(title, buttonText, buttonId, html) {
            return `
                <div class="bg-white rounded-lg shadow">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="text-lg font-semibold">${title}</h3>
                        <button id="${buttonId}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                            <i class="fas fa-plus mr-2"></i>${buttonText}
                        </button>
                    </div>
                    <div class="p-6">
                        ${html}
                    </div>
                </div>
            `;
        }

        /**
         * Formata datas de forma legível
         */
        function formatDate(dateString) {
            try {
                return new Date(dateString).toLocaleDateString('pt-PT');
            } catch (e) {
                return '-';
            }
        }

        /**
         * Mostra toast notification
         */
        function showToast(message, type = 'info') {
            const colors = {
                'success': 'bg-green-500',
                'error': 'bg-red-500',
                'info': 'bg-blue-500'
            };
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 ${colors[type] || colors.info} text-white px-6 py-3 rounded-lg shadow-lg z-50`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // ===== NAVIGATION =====
        document.querySelectorAll('[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();

                // Update active state
                document.querySelectorAll('[data-section]').forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                // Load section
                const section = link.dataset.section;
                const sectionNames = {
                    'dashboard': 'Dashboard',
                    'associados': 'Associados',
                    'quotas': 'Quotas',
                    'noticias': 'Notícias',
                    'eventos': 'Eventos',
                    'projetos': 'Projetos',
                    'configuracoes': 'Configurações',
                    'contacto': 'Mensagens',
                    'newsletter': 'Newsletter'
                };
                document.getElementById('pageTitle').textContent = sectionNames[section] || 'Painel';
                loadSection(section);
            });
        });

        // Load default section
        loadSection('dashboard');

        function loadSection(section) {
            const content = document.getElementById('contentArea');
            
            switch(section) {
                case 'dashboard':
                    loadDashboard(content);
                    break;
                case 'associados':
                    loadAssociados(content);
                    break;
                case 'quotas':
                    loadQuotas(content);
                    break;
                case 'noticias':
                    loadNoticias(content);
                    break;
                case 'eventos':
                    loadEventos(content);
                    break;
                case 'projetos':
                    loadProjetos(content);
                    break;
                case 'configuracoes':
                    loadConfiguracoes(content);
                    break;
                case 'contacto':
                    loadContacto(content);
                break;    
                case 'newsletter':
                    loadNewsletter(content);
                break;
                default:
                    content.innerHTML = '<div class="text-center text-gray-500">Secção em desenvolvimento</div>';
            }
        }

        async function loadDashboard(content) {
            showLoading(content);
            try {
                const data = await apiFetch('/admin/dashboard');
                console.log('Dashboard data:', data); // DEBUG

                // Preparar dados do gráfico - Quotas por ANO
                const quotasAnos = Array.isArray(data.quotasPorAno) ? data.quotasPorAno : [];

                console.log('Quotas por ano:', quotasAnos); // DEBUG

                // Criar array de anos (2020 até ano atual)
                const anoAtual = new Date().getFullYear();
                const anosArray = [];
                for (let ano = 2020; ano <= anoAtual; ano++) {
                    anosArray.push(ano);
                }

                // Criar arrays com dados dos anos
                const padasData = anosArray.map(ano => {
                    const quotaAno = quotasAnos.find(q => q._id.ano === ano);
                    return quotaAno ? parseInt(quotaAno.pagas) || 0 : 0;
                });

                const pendentesData = anosArray.map(ano => {
                    const quotaAno = quotasAnos.find(q => q._id.ano === ano);
                    return quotaAno ? parseInt(quotaAno.pendentes) || 0 : 0;
                });

                console.log('Dados finais:', { padasData, pendentesData, anos: anosArray }); // DEBUG

                const statCards = [
                    createStatCard('users', 'indigo', 'indigo', 'Total Associados', data.estatisticas.associados.total),
                    createStatCard('euro-sign', 'green', 'green', 'Quotas Pagas (Mês)', data.estatisticas.quotas.pagas_mes),
                    createStatCard('clock', 'red', 'red', 'Quotas Pendentes', data.estatisticas.quotas.pendentes),
                    createStatCard('newspaper', 'purple', 'purple', 'Notícias', data.estatisticas.conteudos.noticias)
                ];

                content.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        ${statCards.join('')}
                    </div>

                    <div class="grid md:grid-cols-2 gap-6 mb-8">
                        <div class="bg-white rounded-lg shadow p-6">
                            <h3 class="text-lg font-semibold mb-4">📊 Quotas Anuais (50€/ano)</h3>
                            <canvas id="quotasChart" height="200"></canvas>

                            <div class="mt-6 grid grid-cols-2 gap-4 pt-4 border-t">
                                <div class="text-center">
                                    <p class="text-sm text-gray-600">Total Pagas</p>
                                    <p class="text-2xl font-bold text-blue-600">${padasData.reduce((a,b) => a+b, 0)} associados</p>
                                </div>
                                <div class="text-center">
                                    <p class="text-sm text-gray-600">Total Pendentes</p>
                                    <p class="text-2xl font-bold text-orange-600">${pendentesData.reduce((a,b) => a+b, 0)} associados</p>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white rounded-lg shadow p-6">
                            <h3 class="text-lg font-semibold mb-4">Últimos Associados</h3>
                            <div class="space-y-3">
                                ${data.ultimosAssociados.map(a => `
                                    <div class="flex justify-between items-center">
                                        <div>
                                            <p class="font-medium">${a.nome}</p>
                                            <p class="text-sm text-gray-500">${a.email}</p>
                                        </div>
                                        <span class="text-xs text-gray-400">
                                            ${new Date(a.data_adesao).toLocaleDateString('pt-PT')}
                                        </span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;

                // Criar gráfico otimizado - Quotas por ANO
                const ctx = document.getElementById('quotasChart').getContext('2d');

                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: anosArray,
                        datasets: [{
                            label: '✓ Pagas',
                            data: padasData,
                            backgroundColor: 'rgba(59, 130, 246, 0.8)',
                            borderColor: 'rgb(37, 99, 235)',
                            borderWidth: 1,
                            borderRadius: 4
                        }, {
                            label: '⏱ Pendentes',
                            data: pendentesData,
                            backgroundColor: 'rgba(251, 146, 60, 0.8)',
                            borderColor: 'rgb(234, 88, 12)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        indexAxis: 'x',
                        plugins: {
                            legend: {
                                position: 'bottom',
                                labels: {
                                    font: { size: 12, weight: '500' },
                                    padding: 15
                                }
                            },
                            tooltip: {
                                backgroundColor: 'rgba(0, 0, 0, 0.8)',
                                padding: 12,
                                titleFont: { size: 13, weight: 'bold' },
                                bodyFont: { size: 12 },
                                borderColor: '#ddd',
                                borderWidth: 1,
                                callbacks: {
                                    label: function(context) {
                                        return context.dataset.label + ': ' + context.parsed.y + ' associados';
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    callback: function(value) {
                                        return value;
                                    }
                                },
                                grid: {
                                    color: 'rgba(200, 200, 200, 0.1)',
                                    drawBorder: false
                                }
                            },
                            x: {
                                grid: {
                                    display: false
                                }
                            }
                        }
                    }
                });

            } catch (error) {
                showError(content, 'Erro ao carregar dashboard');
            }
        }

        async function loadAssociados(content) {
            showLoading(content);
            try {
                const data = await apiFetch('/admin/associados?limit=100');

                content.innerHTML = `
                    <div class="bg-white rounded-lg shadow">
                        <div class="p-6 border-b flex justify-between items-center">
                            <h3 class="text-lg font-semibold">Gestão de Associados</h3>
                            <button onclick="novoAssociado()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
                                <i class="fas fa-plus mr-2"></i>Novo Associado
                            </button>
                        </div>

                        <div class="p-6">
                            <div class="mb-4 flex gap-4">
                                <input type="text" id="searchAssociado" placeholder="Pesquisar..."
                                       class="flex-1 border rounded-lg px-4 py-2">
                                <select id="filtroTipo" class="border rounded-lg px-4 py-2">
                                    <option value="">Todos os tipos</option>
                                    <option value="efetivo">Efetivo</option>
                                    <option value="honorario">Honorário</option>
                                    <option value="fundador">Fundador</option>
                                </select>
                                <select id="filtroAtivo" class="border rounded-lg px-4 py-2">
                                    <option value="true">Ativos</option>
                                    <option value="false">Inativos</option>
                                    <option value="">Todos</option>
                                </select>
                            </div>

                            <div class="overflow-x-auto">
                                <table class="w-full">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nº Sócio</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nome</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Tipo</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Quotas</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-200">
                                        ${data.associados.map(a => `
                                            <tr>
                                                <td class="px-6 py-4">${a.numero_socio || '-'}</td>
                                                <td class="px-6 py-4 font-medium">${a.nome}</td>
                                                <td class="px-6 py-4">${a.email}</td>
                                                <td class="px-6 py-4">
                                                    <span class="px-2 py-1 text-xs rounded-full ${
                                                        a.tipo === 'efetivo' ? 'bg-green-100 text-green-800' :
                                                        a.tipo === 'honorario' ? 'bg-purple-100 text-purple-800' : 'bg-gray-100'
                                                    }">
                                                        ${a.tipo}
                                                    </span>
                                                </td>
                                                <td class="px-6 py-4">
                                                    <span class="text-green-600 font-medium">${a.estatisticas_quotas?.pagas || 0}</span>
                                                    <span class="text-gray-400 mx-1">/</span>
                                                    <span class="text-red-600 font-medium">${a.estatisticas_quotas?.pendentes || 0}</span>
                                                </td>
                                                <td class="px-6 py-4">
                                                    <span class="px-2 py-1 text-xs rounded-full ${
                                                        a.ativo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
                                                    }">
                                                        ${a.ativo ? 'Ativo' : 'Inativo'}
                                                    </span>
                                                </td>
                                                <td class="px-6 py-4">
                                                    <button onclick="editarAssociado('${a._id}')"
                                                            class="text-indigo-600 hover:text-indigo-900 mr-3">
                                                        <i class="fas fa-edit"></i>
                                                    </button>
                                                    <button onclick="verQuotasAssociado('${a._id}', '${a.nome}')"
                                                            class="text-green-600 hover:text-green-900 mr-3">
                                                        <i class="fas fa-coins"></i>
                                                    </button>
                                                    <button onclick="eliminarAssociado('${a._id}', '${a.nome}')"
                                                            class="text-red-600 hover:text-red-900">
                                                        <i class="fas fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>

                            <div class="mt-4 flex justify-between items-center">
                                <p class="text-sm text-gray-600">
                                    Total: ${data.paginacao.totalRegistos} associados
                                </p>
                                <div class="flex gap-2">
                                    <button class="px-3 py-1 border rounded hover:bg-gray-50">
                                        <i class="fas fa-chevron-left"></i>
                                    </button>
                                    <span class="px-3 py-1">Página ${data.paginacao.pagina}</span>
                                    <button class="px-3 py-1 border rounded hover:bg-gray-50">
                                        <i class="fas fa-chevron-right"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                // Ligar pesquisa + filtros (tipo e estado) — filtragem combinada nas linhas da tabela
                const searchInput = document.getElementById('searchAssociado');
                const filtroTipo = document.getElementById('filtroTipo');
                const filtroAtivo = document.getElementById('filtroAtivo');

                function aplicarFiltrosAssociados() {
                    const termo = (searchInput?.value || '').trim().toLowerCase();
                    const tipoSel = (filtroTipo?.value || '').toLowerCase();
                    const ativoSel = filtroAtivo?.value; // '', 'true' ou 'false'

                    const linhas = content.querySelectorAll('tbody tr');
                    linhas.forEach(tr => {
                        const celulas = tr.children;
                        if (celulas.length < 7) return;

                        const tipoCel = celulas[3]?.textContent.trim().toLowerCase();
                        const estadoCel = celulas[5]?.textContent.trim().toLowerCase(); // "ativo" ou "inativo"
                        const textoLinha = tr.textContent.toLowerCase();

                        let mostrar = true;
                        if (termo && !textoLinha.includes(termo)) mostrar = false;
                        if (mostrar && tipoSel && tipoCel !== tipoSel) mostrar = false;
                        if (mostrar && ativoSel === 'true' && estadoCel !== 'ativo') mostrar = false;
                        if (mostrar && ativoSel === 'false' && estadoCel !== 'inativo') mostrar = false;

                        tr.style.display = mostrar ? '' : 'none';
                    });
                }

                if (searchInput) searchInput.addEventListener('input', aplicarFiltrosAssociados);
                if (filtroTipo) filtroTipo.addEventListener('change', aplicarFiltrosAssociados);
                if (filtroAtivo) filtroAtivo.addEventListener('change', aplicarFiltrosAssociados);

                // Aplicar logo o estado inicial dos filtros (o select de Ativo arranca em "Ativos")
                aplicarFiltrosAssociados();

            } catch (error) {
                showError(content, 'Erro ao carregar associados');
            }
        }

        async function loadQuotas(content) {
            showLoading(content);

                    dropdown.classList.add('hidden');
                    return;
                }

                const filtered = associados.filter(a =>
                    a.nome.toLowerCase().includes(valor) ||
                    (a.numero_socio && a.numero_socio.toLowerCase().includes(valor))
                );

                if (filtered.length === 0) {

                    showToast('Quota criada com sucesso!', 'success');
                    modal.remove();
                    loadQuotas(document.getElementById('contentArea'));
                } catch (error) {
                    showToast('Erro ao criar quota', 'error');
                }
            });

            const estado = document.getElementById('filtroEstado')?.value || '';

            const rows = document.querySelectorAll('#quotasTableBody tr');
            let visivel = 0;

            rows.forEach(row => {
                const nomeAssociado = row.querySelector('td:nth-child(1)')?.textContent.toLowerCase() || '';
                const anoQuota = row.querySelector('td:nth-child(2)')?.textContent.trim() || '';
                const estadoQuota = row.querySelector('td:nth-child(4)')?.textContent.toLowerCase() || '';

                const matchAssociado = nomeAssociado.includes(associado.toLowerCase());
                const matchAno = !ano || anoQuota === ano;
                const matchEstado = !estado || estadoQuota.includes(estado.toLowerCase());

                if (matchAssociado && matchAno && matchEstado) {
                    row.style.display = '';
                    visivel++;
                } else {
                    row.style.display = 'none';
                }
            });

            if (visivel === 0) {
                const tbody = document.getElementById('quotasTableBody');
                tbody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">Nenhuma quota encontrada</td></tr>';
            }
        };

        return;

    try {

            method: 'DELETE',

        window.selecionarTodasQuotas = function() {
            const checkboxes = document.querySelectorAll('.quota-checkbox:not(:disabled)');

            const selectAll = document.getElementById('selectAllCheckbox');
            if (selectAll) selectAll.checked = true;
        };
        
        window.pagarQuotasSelecionadas = async function(assocId, nomeAssoc) {
            const checkboxes = document.querySelectorAll('.quota-checkbox:checked:not(:disabled)');
            const quotasIds = Array.from(checkboxes).map(cb => cb.dataset.id);
            
            if (quotasIds.length === 0) {
                alert('Selecione pelo menos uma quota pendente');
                return;
            }
            
            const metodo = prompt('Método de pagamento (dinheiro, transferencia, mbway, multibanco):', 'transferencia');

            if (!confirm(`Confirmar pagamento de ${quotasIds.length} quota(s) por ${metodo}?`)) return;

                        metodo_pagamento: metodo,
                        referencia_pagamento: `ADMIN-${Date.now()}`

            if (!confirm('Confirmar registo de pagamento?')) return;
            
            try {
                const response = await fetch(`https://ifpn-institucional-backend.onrender.com/api/quotas/admin/${quotaId}/pagar`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        metodo_pagamento: metodo,
                        referencia_pagamento: `ADMIN-${Date.now()}`
                    })
                });
                
                if (response.ok) {
                    alert('Pagamento registado com sucesso!');
                    modal.remove();
                    window.verQuotasAssociado(assocId, nomeAssoc);
                } else {
                    alert('Erro ao registar pagamento');
                }
            } catch (error) {
                alert('Erro ao registar pagamento');
            }
        };
        
    } catch (error) {
        console.error('Erro:', error);
        alert('Erro ao carregar quotas');
    }
};

        'voluntariado': 'Voluntariado',
        'parceria': 'Parceria',
        'evento': 'Evento',
        'outro': 'Outro'
    };
    return assuntos[assunto] || assunto;
}

        window.exportarInscritos = async function(eventoId, eventoTitulo) {
            const response = await fetch(`https://ifpn-institucional-backend.onrender.com/api/eventos/admin/${eventoId}/inscritos`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await response.json();

            let csv = 'Nome;Email;Nº Sócio;Data Inscrição;Status\n';

                csv += `${insc.associado_id?.nome || ''};${insc.associado_id?.email || ''};${insc.associado_id?.numero_socio || ''};${new Date(insc.data_inscricao).toLocaleDateString('pt-PT')};${insc.status}\n`;

function escapeHtml(str) {
    if (!str) return '';
    return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

                                        `).join('')}
                                    </div>
                                </div>
                                <div class="text-right text-sm text-gray-400">
                                    ${new Date(s.data_subscricao).toLocaleDateString('pt-PT')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        
        // Função para copiar emails
        window.copiarEmails = function() {
            const categoria = document.getElementById('filtroCategoria').value;
            const emails = data.subscribers
                .filter(s => {
                    if (categoria === 'todos') return true;
                    return s.categorias.includes(categoria) || s.categorias.includes('todos');
                })
                .map(s => s.email)
                .join('; ');
            
            navigator.clipboard.writeText(emails);
            alert(`📋 ${emails.split(';').length} emails copiados!`);
        };
        
        window.exportarCSV = function() {
            const categoria = document.getElementById('filtroCategoria').value;
            window.location.href = `https://ifpn-institucional-backend.onrender.com/api/newsletter/admin/exportar?categoria=${categoria}&token=${token}`;
        };
        
        // Filtrar lista
        document.getElementById('filtroCategoria').addEventListener('change', function() {
            const categoria = this.value;
            const listaDiv = document.getElementById('subscribersList');
            
            const filtrados = data.subscribers.filter(s => {
                if (categoria === 'todos') return true;
                return s.categorias.includes(categoria) || s.categorias.includes('todos');
            });
            
            if (filtrados.length === 0) {
                listaDiv.innerHTML = '<div class="p-8 text-center text-gray-500">Nenhum subscritor encontrado</div>';
                return;
            }
            
            listaDiv.innerHTML = filtrados.map(s => `
                <div class="p-4 flex justify-between items-center hover:bg-gray-50">
                    <div>
                        <p class="font-medium">${s.email}</p>
                        <p class="text-sm text-gray-500">${s.nome || 'Sem nome'}</p>
                        <div class="flex gap-1 mt-1">
                            ${s.categorias.map(c => `<span class="px-2 py-0.5 text-xs rounded-full ${getCategoriaClass(c)}">${c}</span>`).join('')}
                        </div>
                    </div>
                    <div class="text-right text-sm text-gray-400">
                        ${new Date(s.data_subscricao).toLocaleDateString('pt-PT')}
                    </div>
                </div>
            `).join('');
        });
        
        function getCategoriaClass(cat) {
            const classes = {
                'projetos': 'bg-green-100 text-green-800',
                'eventos': 'bg-blue-100 text-blue-800',
                'noticias': 'bg-purple-100 text-purple-800',
                'todos': 'bg-yellow-100 text-yellow-800'
            };
            return classes[cat] || 'bg-gray-100';
        }
        
    } catch (error) {
        console.error(error);
        content.innerHTML = `<div class="text-red-600">Erro: ${error.message}</div>`;
    }
}

async function loadConfiguracoes(content) {
    try {
        const response = await fetch('https://ifpn-institucional-backend.onrender.com/api/configuracoes/admin', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!response.ok) throw new Error('Erro ao carregar configurações');
        
        const config = await response.json();
        
        content.innerHTML = `
            <div class="space-y-6">
                <!-- Transmissão ao vivo -->
                <div class="bg-white rounded-xl shadow">
                    <div class="p-6 border-b">
                        <h3 class="text-lg font-semibold">📡 Transmissão ao vivo</h3>
                    </div>
                    <div class="p-6">
                        <form id="formTransmissao" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Título</label>
                                <input type="text" id="live_titulo" value="${config.transmissao_ao_vivo?.titulo || ''}" 
                                       class="w-full border rounded-lg px-4 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Link do vídeo (YouTube, Vimeo, etc.)</label>
                                <input type="text" id="live_link" value="${config.transmissao_ao_vivo?.link || ''}" 
                                       class="w-full border rounded-lg px-4 py-2">
                                <p class="text-xs text-gray-500 mt-1">Ex: https://www.youtube.com/embed/live_stream?channel=UC...</p>
                            </div>
                            <div>
                                <label class="flex items-center">
                                    <input type="checkbox" id="live_ativo" ${config.transmissao_ao_vivo?.ativo ? 'checked' : ''} class="mr-2">
                                    <span class="text-sm">Ativar transmissão ao vivo</span>
                                </label>
                            </div>
                            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">Guardar Alterações</button>
                        </form>
                    </div>
                </div>
                
                <!-- Vídeos do Arquivo -->
                <div class="bg-white rounded-xl shadow">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="text-lg font-semibold">🎬 Vídeos do Arquivo</h3>
                        <div class="flex items-center gap-3">
                            <span id="videosTotalCount" class="text-sm text-gray-500"></span>
                            <button onclick="adicionarVideo()" class="bg-green-600 text-white px-3 py-1 rounded-lg text-sm">
                                <i class="fas fa-plus mr-1"></i>Adicionar Vídeo
                            </button>
                        </div>
                    </div>
                    <div class="p-6">
                        <div id="videosList" class="space-y-3"></div>
                        <div id="videosPagination" class="flex justify-center items-center gap-2 flex-wrap mt-4"></div>
                    </div>
                </div>
        `;
        
        // ========== EVENTOS DOS FORMS ==========
        
        // Transmissão ao vivo
        document.getElementById('formTransmissao').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                transmissao_ao_vivo: {
                    titulo: document.getElementById('live_titulo').value,
                    link: document.getElementById('live_link').value,
                    ativo: document.getElementById('live_ativo').checked
                }
            };
            
            const response = await fetch('https://ifpn-institucional-backend.onrender.com/api/configuracoes/admin', {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (response.ok) alert('Configurações guardadas!');
            else alert('Erro ao guardar');
        });
        
        
        // ========== Paginação dos vídeos no admin ==========
        const videosPorPagina = 5;
        let videosPaginaAtual = 1;

        window.renderVideosAdmin = function() {
            const videosList = document.getElementById('videosList');
            const pag = document.getElementById('videosPagination');
            const counter = document.getElementById('videosTotalCount');
            const original = config.videos_arquivo || [];

            // Ordenar do mais recente para o mais antigo (preservando índice original para as ações)
            const lista = original
                .map((v, idx) => ({ v, idx }))
                .sort((a, b) => (b.v.ordem || 0) - (a.v.ordem || 0));

            counter.textContent = lista.length > 0
                ? `${lista.length} vídeo${lista.length !== 1 ? 's' : ''}`
                : '';

            if (!lista.length) {
                videosList.innerHTML = '<p class="text-gray-500 text-center py-4">Nenhum vídeo no arquivo</p>';
                pag.innerHTML = '';
                return;
            }

            const totalPaginas = Math.ceil(lista.length / videosPorPagina);
            if (videosPaginaAtual > totalPaginas) videosPaginaAtual = totalPaginas;
            if (videosPaginaAtual < 1) videosPaginaAtual = 1;
            const inicio = (videosPaginaAtual - 1) * videosPorPagina;
            const pageItems = lista.slice(inicio, inicio + videosPorPagina);

            videosList.innerHTML = pageItems.map(({ v, idx }, i) => {
                const idxGlobal = idx; // índice real no array do backend
                const posicao = inicio + i + 1; // numeração visual (1 = mais recente)
                return `
                    <div class="border rounded-lg p-4" data-index="${idxGlobal}">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-gray-500 font-semibold">#${posicao} <span class="text-gray-400">(mais recentes primeiro)</span></span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" placeholder="Título" value="${(v.titulo || '').replace(/"/g, '&quot;')}"
                                   class="video-titulo border rounded px-3 py-2">
                            <input type="text" placeholder="Link do vídeo" value="${(v.link || '').replace(/"/g, '&quot;')}"
                                   class="video-link border rounded px-3 py-2">
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-3">
                            <input type="text" placeholder="URL da miniatura (opcional)" value="${(v.thumbnail || '').replace(/"/g, '&quot;')}"
                                   class="video-thumbnail border rounded px-3 py-2">
                            <input type="text" placeholder="Descrição" value="${(v.descricao || '').replace(/"/g, '&quot;')}"
                                   class="video-descricao border rounded px-3 py-2">
                        </div>
                        <div class="flex justify-end gap-2">
                            <button onclick="atualizarVideo(${idxGlobal})" class="text-indigo-600 hover:text-indigo-800">
                                <i class="fas fa-save mr-1"></i>Guardar
                            </button>
                            <button onclick="removerVideo(${idxGlobal})" class="text-red-600 hover:text-red-800">
                                <i class="fas fa-trash mr-1"></i>Remover
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            // Paginação
            if (totalPaginas <= 1) { pag.innerHTML = ''; return; }
            const btnClass = 'px-3 py-1 border-2 border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-600 hover:text-white transition disabled:opacity-40 disabled:cursor-not-allowed';
            let html = `<button class="${btnClass}" ${videosPaginaAtual === 1 ? 'disabled' : ''} onclick="mudarPaginaVideosAdmin(${videosPaginaAtual - 1})"><i class="fas fa-chevron-left"></i></button>`;
            for (let i = 1; i <= totalPaginas; i++) {
                const ativa = i === videosPaginaAtual ? 'bg-indigo-600 text-white' : '';
                html += `<button class="${btnClass} ${ativa}" onclick="mudarPaginaVideosAdmin(${i})">${i}</button>`;
            }
            html += `<button class="${btnClass}" ${videosPaginaAtual === totalPaginas ? 'disabled' : ''} onclick="mudarPaginaVideosAdmin(${videosPaginaAtual + 1})"><i class="fas fa-chevron-right"></i></button>`;
            pag.innerHTML = html;
        };

        window.mudarPaginaVideosAdmin = function(p) {
            videosPaginaAtual = p;
            renderVideosAdmin();
        };

        // Renderização inicial
        renderVideosAdmin();

        // Funções auxiliares
        window.adicionarVideo = function() {
            const videosList = document.getElementById('videosList');

            const newVideoHtml = `
                <div class="border rounded-lg p-4" data-new="true">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-xs text-green-600 font-semibold"><i class="fas fa-plus-circle mr-1"></i>Novo vídeo</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" placeholder="Título" class="video-titulo border rounded px-3 py-2">
                        <input type="text" placeholder="Link do vídeo" class="video-link border rounded px-3 py-2">
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <input type="text" placeholder="URL da miniatura" class="video-thumbnail border rounded px-3 py-2">
                        <input type="text" placeholder="Descrição" class="video-descricao border rounded px-3 py-2">
                    </div>
                    <div class="flex justify-end gap-2">
                        <button onclick="guardarNovoVideo(this)" class="bg-indigo-600 text-white px-3 py-1 rounded text-sm">
                            <i class="fas fa-save mr-1"></i>Guardar
                        </button>
                        <button onclick="this.closest('.border').remove()" class="text-red-600 text-sm">Cancelar</button>
                    </div>
                </div>
            `;

            // Limpar mensagem vazio se existir
            const empty = videosList.querySelector('.text-gray-500');
            if (empty) empty.remove();

            videosList.insertAdjacentHTML('afterbegin', newVideoHtml);
        };
        
        window.guardarNovoVideo = async function(btn) {
            const div = btn.closest('.border');
            const titulo = div.querySelector('.video-titulo').value;
            const link = div.querySelector('.video-link').value;
            const thumbnail = div.querySelector('.video-thumbnail').value;
            const descricao = div.querySelector('.video-descricao').value;
            
            if (!titulo || !link) {
                alert('Título e link são obrigatórios');
                return;
            }
            
            const response = await fetch('https://ifpn-institucional-backend.onrender.com/api/configuracoes/admin/videos', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, link, thumbnail, descricao })
            });
            
            if (response.ok) {
                alert('Vídeo adicionado!');
                loadConfiguracoes(content);
            } else {
                alert('Erro ao adicionar vídeo');
            }
        };
        
        window.atualizarVideo = async function(index) {
            const div = document.querySelector(`.border[data-index="${index}"]`);
            const titulo = div.querySelector('.video-titulo').value;
            const link = div.querySelector('.video-link').value;
            const thumbnail = div.querySelector('.video-thumbnail')?.value || '';
            const descricao = div.querySelector('.video-descricao')?.value || '';
            
            const response = await fetch(`https://ifpn-institucional-backend.onrender.com/api/configuracoes/admin/videos/${index}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, link, thumbnail, descricao })
            });
            
            if (response.ok) alert('Vídeo atualizado!');
            else alert('Erro ao atualizar');
        };
        
        window.removerVideo = async function(index) {
            if (!confirm('Remover este vídeo?')) return;
            
            const response = await fetch(`https://ifpn-institucional-backend.onrender.com/api/configuracoes/admin/videos/${index}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (response.ok) {
                alert('Vídeo removido!');
                loadConfiguracoes(content);
            } else {
                alert('Erro ao remover vídeo');
            }
        };
        
    } catch (error) {
        console.error('Erro:', error);
        content.innerHTML = `<div class="text-red-600">Erro: ${error.message}</div>`;
    }
}


        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('associado');
            window.location.href = '/frontend/index.html';
        }
    </script>
</body>
</html>
