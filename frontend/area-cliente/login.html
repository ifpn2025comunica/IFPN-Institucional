<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Área do Associado IFPN</title>
    <link rel="icon" type="image/png" href="/assets/images/imgPLF.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navbar simples -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-37">
                <div class="flex items-center">
                    <a href="/frontend/index.html" class="flex items-center space-x-2">
                        <img src="/frontend/assets/images/imgPLF.png" alt="Logótipo IFPN" class="h-36 w-auto">
                        <span class="font-semibold text-gray-800">Início</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full bg-white rounded-lg shadow-xl p-8">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Área do Associado</h2>
                <p class="text-gray-600 mt-2">Faça login para aceder às suas quotas e informações</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Email
                    </label>
                    <input type="email" 
                           id="email"
                           required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="seu@email.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Password
                    </label>
                    <input type="password" 
                           id="password"
                           required
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                           placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="remember" class="ml-2 block text-sm text-gray-900">
                            Lembrar-me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="/frontend/contato.html" class="font-medium text-indigo-600 hover:text-indigo-500">
                            Esqueceu-se da password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" 
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Entrar
                    </button>
                </div>

                <div class="text-center">
                    <p class="text-sm text-gray-600">
                        Ainda não é associado? 
                        <a href="/frontend/contato.html" class="font-medium text-indigo-600 hover:text-indigo-500">
                            Contacte-nos para aderir
                        </a>
                    </p>
                </div>
            </form>

            <div id="errorMessage" class="mt-4 text-red-600 text-sm text-center hidden"></div>
        </div>
    </div>
    <!-- FOOTER (carregado automaticamente) -->
    <div id="footer-placeholder"></div>

    <script src="/frontend/js/include.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('https://ifpn-public.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Guardar token e dados do associado
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('associado', JSON.stringify(data.associado));
                    
                    if (data.associado.role === 'admin') {
                        window.location.href = '/frontend/admin/index.html';  
                    } else {
                        window.location.href = '/frontend/area-cliente/dashboard.html';  
                    }
                } else {
                    // Mostrar erro
                    const errorDiv = document.getElementById('errorMessage');
                    errorDiv.textContent = data.error || 'Erro ao fazer login';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Erro:', error);
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Erro de conexão com o servidor';
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
