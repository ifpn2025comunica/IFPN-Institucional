<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - IFPN</title>
    <link rel="icon" type="image/png" href="/assets/images/imgPLF.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .hero-gradient {
            background: linear-gradient(135deg, #423ea3 0%, #ba1239 100%);
        }

        .event-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .event-card:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .pag-btn {
            padding: 0.5rem 1rem;
            border: 2px solid #4946df;
            background-color: #ffffff;
            color: #4946df;
            transition: all 0.2s;
            font-weight: 600;
        }
        .pag-btn:hover:not(:disabled) {
            background-color: #4946df;
            color: #ffffff;
        }
        .pag-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .pag-btn.active { background-color: #4946df; color: #ffffff; }

        .view-btn {
            padding: 0.625rem 1.5rem;
            border: 2px solid #4946df;
            background-color: #ffffff;
            color: #4946df;
            font-weight: 600;
            transition: all 0.2s;
        }
        .view-btn.active, .view-btn:hover {
            background-color: #4946df;
            color: #ffffff;
        }
    </style>
</head>
<body class="bg-white">

    <!-- HEADER -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <section class="max-w-7xl mx-auto text-white bg-[url('/frontend/assets/images/hero.png')] bg-cover bg-center mt-6 mb-6">
        <div class="max-w-7xl mx-auto">
            <div class="grid md:grid-cols-2 gap-12 items-center" style="height: 150px;">
                <div class="hidden md:block"></div>
                <div>
                    <h1 class="text-4xl md:text-5xl font-bold leading-tight text-[#4946df] mb-6 text-right">
                        Eventos
                    </h1>
                    <p class="text-xl mb-8 text-black text-right">
                        Participe nas nossas iniciativas culturais e educativas.
                    </p>
                </div>
            </div>
        </div>
    </section>

    <!-- Barra de pesquisa -->
    <section class="bg-white">
        <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-3">
            <div class="px-4 py-6 flex justify-center">
                <div class="relative w-full max-w-2xl">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-[#4946df]"></i>
                    <input type="text" id="searchEventos" placeholder="Pesquisar eventos por título..."
                           class="w-full pl-12 pr-12 py-3 border-2 border-[#4946df] focus:outline-none focus:ring-2 focus:ring-[#ba1239]">
                    <button id="clearSearch" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-[#4946df] hover:text-[#ba1239] hidden">
                        <i class="fas fa-times-circle text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- Selector Lista / Calendário -->
    <section class="bg-white">
        <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-3">
            <div class="px-4 py-6 flex justify-center gap-3">
                <button id="viewListBtn" class="view-btn active"><i class="fas fa-list mr-2"></i>Lista</button>
                <button id="viewCalendarBtn" class="view-btn"><i class="fas fa-calendar-alt mr-2"></i>Calendário</button>
            </div>
        </div>
    </section>

    <!-- Tabs: Próximos / Passados / Todos (só visíveis na vista Lista) -->
    <section id="estadoTabsWrapper" class="bg-white">
        <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-3">
            <div class="px-4 py-6 flex justify-center flex-wrap gap-3">
                <button class="view-btn estado-tab active" data-estado="proximos">
                    <i class="fas fa-arrow-right mr-2"></i>Próximos
                    <span class="ml-1 text-xs" data-count="proximos"></span>
                </button>
                <button class="view-btn estado-tab" data-estado="passados">
                    <i class="fas fa-history mr-2"></i>Passados
                    <span class="ml-1 text-xs" data-count="passados"></span>
                </button>
                <button class="view-btn estado-tab" data-estado="todos">
                    <i class="fas fa-list mr-2"></i>Todos
                    <span class="ml-1 text-xs" data-count="todos"></span>
                </button>
            </div>
        </div>
    </section>

    <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-3"></div>

    <!-- VISTA LISTA -->
    <section id="listView" class="bg-white">
        <div class="max-w-7xl mx-auto">
            <div class="flex text-left mb-3 w-full px-4 py-2 border-b-4 border-[#4946df]">
                <h1 id="eventosTitulo" class="text-5xl font-bold text-[#4946df] pt-5">Próximos Eventos</h1>
            </div>
            <div id="eventosContainer" class="grid md:grid-cols-2 lg:grid-cols-3"></div>
            <div id="pagination" class="flex justify-center gap-2 flex-wrap py-8"></div>
        </div>
    </section>

    <!-- VISTA CALENDÁRIO -->
    <section id="calendarView" class="bg-white hidden">
        <div class="max-w-7xl mx-auto">
            <div class="flex text-left mb-3 w-full px-4 py-2 border-b-4 border-[#4946df]">
                <h1 class="text-5xl font-bold text-[#4946df] pt-5">Calendário</h1>
            </div>
            <div class="border-2 border-[#4946df] overflow-hidden mx-4 mb-6">
                <div class="hero-gradient text-white p-4 flex justify-between items-center">
                    <h2 id="calendarMonth" class="text-xl font-bold"></h2>
                    <div class="flex gap-2">
                        <button onclick="mudarMes(-1)" class="px-3 py-1 hover:bg-white/20 transition">◀</button>
                        <button onclick="irHoje()" class="px-3 py-1 bg-white text-[#4946df] font-semibold hover:bg-[#e0def7] transition">Hoje</button>
                        <button onclick="mudarMes(1)" class="px-3 py-1 hover:bg-white/20 transition">▶</button>
                    </div>
                </div>
                <div class="p-4 bg-white">
                    <div class="grid grid-cols-7 gap-2 text-center font-semibold mb-2 text-[#4946df]">
                        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-2"></div>
                </div>
                <div class="border-t-4 border-[#4946df] p-4 bg-[#e0def7]">
                    <h3 id="selectedDateTitle" class="font-semibold mb-3 text-[#4946df] text-lg">Eventos do dia</h3>
                    <div id="dayEvents" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </section>

    <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-3"></div>
    <div class="max-w-7xl mx-auto overflow-hidden mt-10 mb-10" style="height: 100px;">
        <img src="/frontend/assets/images/separador-01.png"
             alt=""
             class="w-full h-full object-cover object-center">
    </div>

    <!-- Newsletter Section -->
    <section class="bg-white">
        <div class="max-w-7xl mx-auto text-center">
            <div class="text-left text-5xl font-bold text-white bg-[#4946df] px-4 pb-1 pt-8">
                <h2 class="text-4xl font-bold text-white mb-4">Receba as nossas novidades</h2>
            </div>
            <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mt-1"></div>
            <form id="newsletterForm" class="max-w-7xl mx-auto">
                <div class="flex flex-col sm:flex-row px-4 md:px-40">
                    <input type="email" id="newsletterEmail"
                           placeholder="O seu email *"
                           class="flex-1 px-4 py-8 mb-1 mt-1 border-l-2 border-[#4946df] focus:outline-none focus:ring-2 focus:ring-white"
                           required>
                    <input type="text" id="newsletterNome"
                           placeholder="O seu nome"
                           class="flex-1 px-4 py-8 mb-1 mt-1 border-l-2 border-r-2 border-[#4946df] focus:outline-none focus:ring-2 focus:ring-white">
                </div>
                <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-1"></div>
                <div class="bg-white/10">
                    <p class="text-center text-2xl font-bold text-[#4946df] p-2">Receber notificações sobre:</p>
                    <div class="max-w-7xl mx-auto border-t border-[#4946df] mb-1"></div>
                    <div class="flex flex-wrap gap-6 md:gap-12 justify-center mb-2 w-full px-4 md:px-10">
                        <label class="text-xl p-4 md:p-6 relative flex items-center gap-2 text-[#4946df] cursor-pointer bg-white">
                            <input type="checkbox" value="eventos" class="categoria-checkbox w-6 h-6 rounded">
                            <span>Eventos</span><i class="fas fa-calendar mr-2"></i>
                        </label>
                        <label class="text-xl p-4 md:p-6 relative flex items-center gap-2 text-[#4946df] cursor-pointer bg-white">
                            <input type="checkbox" value="noticias" class="categoria-checkbox w-6 h-6 rounded">
                            <span>Notícias</span><i class="fas fa-newspaper mr-2"></i>
                        </label>
                        <label class="text-xl p-4 md:p-6 relative flex items-center gap-2 text-[#4946df] cursor-pointer bg-white">
                            <input type="checkbox" value="todos" id="categoriaTodos" class="w-6 h-6 rounded">
                            <span>Todas</span><i class="fas fa-star mr-2"></i>
                        </label>
                    </div>
                </div>
                <div class="max-w-7xl mx-auto border-t-4 border-[#4946df] mb-1"></div>
                <button type="submit" class="text-[#4946df] px-6 p-2 text-xl font-semibold hover:bg-[#ba1239] hover:text-white transition">
                    <i class="fas fa-paper-plane mr-2"></i>Subscrever
                </button>
            </form>
        </div>
    </section>

    <div class="max-w-7xl mx-auto border-t-2 border-[#4946df] mt-1 mb-1"></div>
    <div class="max-w-7xl mx-auto overflow-hidden mt-10 mb-10" style="height: 100px;">
        <img src="/frontend/assets/images/separador-01.png"
             alt=""
             class="w-full h-full object-cover object-center">
    </div>

    <!-- FOOTER -->
    <div id="footer-placeholder"></div>

    <!-- Modal do Evento -->
    <div id="eventoModal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden items-center justify-center p-4">
        <div class="bg-white max-w-2xl w-full max-h-[90vh] overflow-y-auto border-2 border-[#4946df]">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4 border-b-4 border-[#4946df] pb-3">
                    <h2 id="modalTitulo" class="text-2xl font-bold text-[#4946df]">-</h2>
                    <button onclick="fecharModal()" class="text-[#4946df] hover:text-[#ba1239]"><i class="fas fa-times text-2xl"></i></button>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-2 text-black"><i class="fas fa-calendar w-5 text-[#ba1239]"></i><span id="modalData">-</span></div>
                    <div class="flex items-center gap-2 text-black"><i class="fas fa-clock w-5 text-[#ba1239]"></i><span id="modalHora">-</span></div>
                    <div class="flex items-center gap-2 text-black"><i class="fas fa-map-marker-alt w-5 text-[#ba1239]"></i><span id="modalLocal">-</span></div>
                    <div id="modalImagem" class="mt-4 hidden"><img src="" class="w-full h-64 object-cover"></div>
                    <div id="modalDescricao" class="mt-4 text-black"></div>
                    <div class="mt-6 flex gap-3">
                        <button id="btnInscrever" class="flex-1 bg-[#4946df] text-white py-3 font-semibold hover:bg-[#ba1239] transition">Inscrever-me</button>
                        <button onclick="partilharEvento()" class="px-4 py-3 border-2 border-[#4946df] text-[#4946df] hover:bg-[#4946df] hover:text-white transition"><i class="fas fa-share-alt"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/frontend/js/include.js"></script>
    <script>
        const API_URL = 'https://ifpn-public.onrender.com/api/eventos';
        let todosEventos = [];
        let eventosFiltrados = [];
        let paginaAtual = 1;
        const itensPorPagina = 9;
        let vistaAtual = 'lista';
        let mesAtual = new Date();
        let dataSelecionada = new Date();
        let filtroEstado = 'proximos'; // 'proximos' | 'passados' | 'todos'

        // Classifica um evento pela data_inicio
        function estadoEvento(ev) {
            if (!ev.data_inicio) return 'proximo';
            const d = new Date(ev.data_inicio);
            const hoje = new Date();
            hoje.setHours(0, 0, 0, 0);
            return d < hoje ? 'passado' : 'proximo';
        }

        function atualizarContadoresEventos() {
            const total = todosEventos.length;
            const proximos = todosEventos.filter(e => estadoEvento(e) === 'proximo').length;
            const passados = todosEventos.filter(e => estadoEvento(e) === 'passado').length;
            const cp = document.querySelector('[data-count="proximos"]');
            const cps = document.querySelector('[data-count="passados"]');
            const ct = document.querySelector('[data-count="todos"]');
            if (cp) cp.textContent = `(${proximos})`;
            if (cps) cps.textContent = `(${passados})`;
            if (ct) ct.textContent = `(${total})`;
        }

        async function carregarTodosEventos() {
            try {
                const response = await fetch(`${API_URL}?limit=1000`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (Array.isArray(data)) todosEventos = data;
                else if (data.eventos && Array.isArray(data.eventos)) todosEventos = data.eventos;
                else if (data.data && Array.isArray(data.data)) todosEventos = data.data;
                else todosEventos = [];
                todosEventos.sort((a, b) => new Date(b.data_inicio) - new Date(a.data_inicio));
                paginaAtual = 1;
                aplicarFiltros();
                atualizarContadoresEventos();
            } catch (error) {
                console.error(error);
                document.getElementById('eventosContainer').innerHTML = `<div class="col-span-3 text-center text-[#ba1239] py-8 border-2 border-[#ba1239] mx-4">Erro ao carregar eventos: ${error.message}</div>`;
                document.getElementById('pagination').innerHTML = '';
            }
        }

        function filtrarPorTitulo(termo) {
            paginaAtual = 1;
            aplicarFiltros(termo);
        }

        function aplicarFiltros(termoOverride) {
            // 1) filtrar por estado
            let base;
            if (filtroEstado === 'proximos') base = todosEventos.filter(e => estadoEvento(e) === 'proximo');
            else if (filtroEstado === 'passados') base = todosEventos.filter(e => estadoEvento(e) === 'passado');
            else base = [...todosEventos];
            // 2) filtrar por título
            const termo = termoOverride !== undefined ? termoOverride : (document.getElementById('searchEventos')?.value || '');
            if (termo.trim() === '') {
                eventosFiltrados = base;
            } else {
                const t = termo.toLowerCase();
                eventosFiltrados = base.filter(e => e.titulo && e.titulo.toLowerCase().includes(t));
            }
            renderizarPaginaLista();
        }

        function renderizarPaginaLista() {
            const totalPaginas = Math.ceil(eventosFiltrados.length / itensPorPagina);
            if (paginaAtual < 1) paginaAtual = 1;
            if (paginaAtual > totalPaginas && totalPaginas > 0) paginaAtual = totalPaginas;

            const inicio = (paginaAtual - 1) * itensPorPagina;
            const eventosPagina = eventosFiltrados.slice(inicio, inicio + itensPorPagina);
            renderizarEventos(eventosPagina);
            renderizarPaginacao(totalPaginas);
        }

        function renderizarEventos(eventos) {
            const container = document.getElementById('eventosContainer');
            if (!eventos || eventos.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center py-12 text-[#4946df] border-2 border-[#4946df] bg-[#e0def7] mx-4"><i class="fas fa-calendar-times text-4xl mb-2"></i><p class="text-lg font-semibold">Nenhum evento encontrado</p></div>`;
                return;
            }
            container.innerHTML = eventos.map(e => {
                const est = estadoEvento(e);
                const badgeClass = est === 'passado'
                    ? 'bg-gray-200 text-gray-700 border-gray-400'
                    : 'bg-[#e0def7] text-[#4946df] border-[#4946df]';
                const badgeLabel = est === 'passado' ? 'Passado' : 'Próximo';
                return `
                <div class="bg-white border-2 border-[#4946df] overflow-hidden event-card cursor-pointer" onclick="abrirEvento('${e._id}')">
                    ${e.imagem ? `<img src="${e.imagem}" class="w-full h-48 object-cover">` : `<div class="w-full h-48 hero-gradient flex items-center justify-center"><i class="fas fa-calendar-alt text-white text-4xl"></i></div>`}
                    <div class="p-5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-xs text-[#ba1239] font-semibold"><i class="far fa-calendar mr-1"></i>${e.data_inicio ? new Date(e.data_inicio).toLocaleDateString('pt-PT') : 'Data não definida'}</span>
                            <span class="border ${badgeClass} px-2 py-0.5 text-xs font-semibold">${badgeLabel}</span>
                        </div>
                        <h3 class="font-bold text-xl mb-2 text-[#4946df]">${escapeHtml(e.titulo)}</h3>
                        <p class="text-black text-sm">${escapeHtml((e.descricao || '').substring(0, 100))}...</p>
                        <div class="mt-3 text-[#ba1239] text-sm font-semibold">Ver detalhes →</div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderizarPaginacao(totalPaginas) {
            const paginationDiv = document.getElementById('pagination');
            if (totalPaginas <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            let html = `<button class="pag-btn" ${paginaAtual===1?'disabled':''} onclick="mudarPagina(${paginaAtual-1})"><i class="fas fa-chevron-left"></i></button>`;
            for (let i=1; i<=totalPaginas; i++) {
                html += `<button class="pag-btn ${i===paginaAtual?'active':''}" onclick="mudarPagina(${i})">${i}</button>`;
            }
            html += `<button class="pag-btn" ${paginaAtual===totalPaginas?'disabled':''} onclick="mudarPagina(${paginaAtual+1})"><i class="fas fa-chevron-right"></i></button>`;
            paginationDiv.innerHTML = html;
        }

        function mudarPagina(pagina) {
            const totalPaginas = Math.ceil(eventosFiltrados.length / itensPorPagina);
            if (pagina < 1 || pagina > totalPaginas) return;
            paginaAtual = pagina;
            renderizarPaginaLista();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        const searchInput = document.getElementById('searchEventos');
        const clearBtn = document.getElementById('clearSearch');

        function aplicarPesquisa() {
            const termo = searchInput.value;
            filtrarPorTitulo(termo);
            if (termo === '') clearBtn.classList.add('hidden');
            else clearBtn.classList.remove('hidden');
        }

        searchInput.addEventListener('input', aplicarPesquisa);
        clearBtn.addEventListener('click', () => { searchInput.value = ''; aplicarPesquisa(); });

        async function carregarEventosCalendario() {
            const resp = await fetch(`${API_URL}/calendario?ano=${mesAtual.getFullYear()}&mes=${mesAtual.getMonth()+1}`);
            const eventos = await resp.json();
            renderizarCalendario(eventos);
        }

        function renderizarCalendario(eventos) {
            const primeiroDia = new Date(mesAtual.getFullYear(), mesAtual.getMonth(), 1);
            const ultimoDia = new Date(mesAtual.getFullYear(), mesAtual.getMonth()+1, 0);
            const diasNoMes = ultimoDia.getDate();
            const primeiroDiaSemana = primeiroDia.getDay();
            document.getElementById('calendarMonth').innerHTML = mesAtual.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });
            let html = '';
            for(let i=0; i<primeiroDiaSemana; i++) html += '<div class="p-2 text-center"></div>';
            for(let dia=1; dia<=diasNoMes; dia++) {
                const dataStr = `${mesAtual.getFullYear()}-${String(mesAtual.getMonth()+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
                const temEvento = eventos.some(e => e.data_inicio.startsWith(dataStr));
                const isHoje = new Date().toDateString() === new Date(mesAtual.getFullYear(), mesAtual.getMonth(), dia).toDateString();
                const isSelecionado = dataSelecionada.toDateString() === new Date(mesAtual.getFullYear(), mesAtual.getMonth(), dia).toDateString();
                let cls = 'p-2 text-center cursor-pointer transition border-2';
                if (isSelecionado) cls += ' bg-[#4946df] text-white border-[#4946df]';
                else if (temEvento) cls += ' bg-[#e0def7] text-[#ba1239] font-bold border-[#ba1239] hover:bg-[#4946df] hover:text-white';
                else cls += ' border-transparent hover:bg-[#e0def7] text-black';
                if (isHoje && !isSelecionado) cls += ' ring-2 ring-[#ba1239]';
                html += `<div class="${cls}" onclick="selecionarDia('${dataStr}')">${dia}</div>`;
            }
            document.getElementById('calendarGrid').innerHTML = html;
            if(dataSelecionada) mostrarEventosDoDia(eventos, dataSelecionada);
        }

        function selecionarDia(dataStr) { dataSelecionada = new Date(dataStr); carregarEventosCalendario(); }

        function mostrarEventosDoDia(eventos, data) {
            const dataStr = data.toISOString().split('T')[0];
            const eventosDoDia = eventos.filter(e => e.data_inicio.startsWith(dataStr));
            document.getElementById('selectedDateTitle').innerHTML = `<i class="far fa-calendar mr-1"></i>Eventos de ${data.toLocaleDateString('pt-PT')}`;
            if(!eventosDoDia.length) { document.getElementById('dayEvents').innerHTML = '<p class="text-black">Nenhum evento neste dia</p>'; return; }
            document.getElementById('dayEvents').innerHTML = eventosDoDia.map(e => `<div class="border-2 border-[#4946df] p-3 cursor-pointer hover:bg-white transition bg-white" onclick="abrirEvento('${e._id}')"><p class="font-semibold text-[#4946df]">${escapeHtml(e.titulo)}</p><p class="text-sm text-black"><i class="fas fa-map-marker-alt mr-1 text-[#ba1239]"></i>${e.local?.nome||'Local a definir'}</p></div>`).join('');
        }

        function mudarMes(delta) { mesAtual.setMonth(mesAtual.getMonth()+delta); carregarEventosCalendario(); }
        function irHoje() { mesAtual = new Date(); dataSelecionada = new Date(); carregarEventosCalendario(); }

        window.abrirEvento = async function(id) {
            try {
                const resp = await fetch(`${API_URL}/${id}`);
                const e = await resp.json();
                document.getElementById('modalTitulo').innerHTML = e.titulo;
                document.getElementById('modalData').innerHTML = new Date(e.data_inicio).toLocaleDateString('pt-PT');
                document.getElementById('modalHora').innerHTML = new Date(e.data_inicio).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('modalLocal').innerHTML = e.local?.online ? 'Online' : (e.local?.nome || 'Local a definir');
                document.getElementById('modalDescricao').innerHTML = e.descricao;
                const imgDiv = document.getElementById('modalImagem');
                if(e.imagem) { imgDiv.querySelector('img').src = e.imagem; imgDiv.classList.remove('hidden'); }
                else imgDiv.classList.add('hidden');
                document.getElementById('eventoModal').dataset.eventoId = id;
                document.getElementById('eventoModal').classList.remove('hidden');
                document.getElementById('eventoModal').classList.add('flex');
            } catch(err) { console.error(err); alert('Erro ao carregar detalhes do evento'); }
        };
        function fecharModal() { document.getElementById('eventoModal').classList.add('hidden'); document.getElementById('eventoModal').classList.remove('flex'); }
        function partilharEvento() { navigator.clipboard.writeText(window.location.href); alert('Link copiado!'); }
        document.getElementById('btnInscrever').onclick = async function() {
            const token = localStorage.getItem('token');
            if(!token) { if(confirm('Para se inscrever precisa de fazer login. Deseja ir para o login?')) window.location.href='/frontend/area-cliente/login.html'; return; }
            const eventoId = document.getElementById('eventoModal').dataset.eventoId;
            try {
                const resp = await fetch(`${API_URL}/${eventoId}/inscrever`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
                if(resp.ok) alert('Inscrição realizada com sucesso!');
                else alert('Erro ao inscrever');
            } catch(err) { alert('Erro ao inscrever'); }
        };

        document.getElementById('viewListBtn').onclick = (e) => {
            vistaAtual = 'lista';
            document.getElementById('listView').classList.remove('hidden');
            document.getElementById('calendarView').classList.add('hidden');
            document.getElementById('estadoTabsWrapper').classList.remove('hidden');
            document.getElementById('viewListBtn').classList.add('active');
            document.getElementById('viewCalendarBtn').classList.remove('active');
            renderizarPaginaLista();
        };
        document.getElementById('viewCalendarBtn').onclick = () => {
            vistaAtual = 'calendario';
            document.getElementById('listView').classList.add('hidden');
            document.getElementById('calendarView').classList.remove('hidden');
            document.getElementById('estadoTabsWrapper').classList.add('hidden');
            document.getElementById('viewCalendarBtn').classList.add('active');
            document.getElementById('viewListBtn').classList.remove('active');
            carregarEventosCalendario();
        };

        // Listener das tabs de estado (próximos / passados / todos)
        document.querySelectorAll('.estado-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.estado-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                filtroEstado = btn.dataset.estado;
                const labels = { proximos: 'Próximos Eventos', passados: 'Eventos Passados', todos: 'Todos os Eventos' };
                const titulo = document.getElementById('eventosTitulo');
                if (titulo) titulo.textContent = labels[filtroEstado];
                paginaAtual = 1;
                aplicarFiltros();
            });
        });

        // Newsletter
        document.getElementById('categoriaTodos')?.addEventListener('change', function(e) {
            document.querySelectorAll('.categoria-checkbox').forEach(cb => { if (cb.id !== 'categoriaTodos') cb.checked = e.target.checked; });
        });
        document.getElementById('newsletterForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('newsletterEmail').value;
            const nome = document.getElementById('newsletterNome').value;
            const categorias = Array.from(document.querySelectorAll('.categoria-checkbox:checked')).map(cb => cb.value);
            if (categorias.length === 0) { alert('Selecione pelo menos uma categoria'); return; }
            try {
                const response = await fetch('https://ifpn-public.onrender.com/api/newsletter/subscribe', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, nome, categorias })
                });
                if (response.ok) { alert('Inscrição realizada com sucesso!'); document.getElementById('newsletterForm').reset(); }
                else alert('Erro ao subscrever');
            } catch (error) { alert('Erro ao subscrever'); }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        carregarTodosEventos();
    </script>
</body>
</html>
